<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}文章转视频{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* 顶栏 */
        .header {
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            padding: 16px 0;
            margin-bottom: 24px;
        }
        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; color: #fff; }
        .header a { color: #6aa6ff; text-decoration: none; margin-left: 20px; }
        .header a:hover { text-decoration: underline; }

        /* 卡片 */
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card h2 { font-size: 16px; margin-bottom: 12px; color: #fff; }
        .card h3 { font-size: 14px; margin-bottom: 8px; color: #ccc; }

        /* 表格 */
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #2a2a2a;
            font-size: 14px;
        }
        th { color: #999; font-weight: normal; }
        td a { color: #6aa6ff; text-decoration: none; }
        td a:hover { text-decoration: underline; }

        /* 状态标签 */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .badge-pending { background: #333; color: #999; }
        .badge-rendered { background: #1a3a1a; color: #6c6; }
        .badge-completed { background: #1a2a4a; color: #6af; }
        .badge-confirmed { background: #2a2a1a; color: #ca6; }

        /* 按钮 */
        .btn {
            display: inline-block;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
        }
        .btn-primary { background: #2563eb; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-success { background: #16a34a; }
        .btn-success:hover { background: #15803d; }
        .btn-warning { background: #d97706; }
        .btn-warning:hover { background: #b45309; }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }

        /* 图片缩略图 */
        .thumb {
            width: 160px;
            height: 90px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #333;
            background: #111;
        }
        .thumb-placeholder {
            width: 160px;
            height: 90px;
            border-radius: 4px;
            border: 1px dashed #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 12px;
        }

        /* 进度条 */
        .progress-bar {
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #2563eb;
            border-radius: 3px;
            transition: width 0.3s;
        }

        /* 表单 */
        input[type="text"], textarea, select {
            background: #111;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
        }
        textarea { min-height: 200px; resize: vertical; }
        label { display: block; margin-bottom: 4px; font-size: 13px; color: #999; }
        .form-group { margin-bottom: 16px; }
        .form-row { display: flex; gap: 16px; }
        .form-row .form-group { flex: 1; }

        /* 网格 */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

        /* 消息 */
        .alert {
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .alert-success { background: #1a3a1a; color: #6c6; border: 1px solid #2a5a2a; }
        .alert-error { background: #3a1a1a; color: #c66; border: 1px solid #5a2a2a; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>文章转视频</h1>
            <nav>
                <a href="/">项目列表</a>
                <a href="/ui/projects/new">新建项目</a>
            </nav>
        </div>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
